<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Number Generator</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <button id="theme-toggle">Dark Mode</button>
  <h1>Lotto Number Generator</h1>
  <button id="generator-button">Generate Numbers</button>
  <div id="lotto-numbers"></div>

  <section id="partnership-form">
    <h2>제휴 문의</h2>
    <form action="https://formspree.io/f/mbdaevob" method="POST">
      <div class="form-group">
        <label for="name">이름/기업명</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" rows="4" required></textarea>
      </div>
      <button type="submit" id="submit-button">문의하기</button>
    </form>
  </section>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
